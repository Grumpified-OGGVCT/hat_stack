# Gate configuration per SPEC.md §7
gates:
  cost_budget:
    max_tokens_per_pr: 150000
    max_usd_per_pr: 0.15  # Ollama Cloud pricing — $0.15 covers ~18 hats
  security_fast_path:
    enabled: true
    trigger_severity: "CRITICAL"
  consistency:
    enabled: true
    conflict_resolution: "cove"  # Gold Hat resolves conflicts
  timeout:
    default_per_hat_seconds: 120

# Execution settings per SPEC.md §8
execution:
  strategy: "tiered_parallel"
  max_concurrent_hats: 6
  max_cloud_parallel: 4  # Max cloud model calls in parallel
  max_local_parallel: 1  # Local models run one at a time
  trio_mode_cloud: 3     # Fallback: 3 cloud + 1 local when budget is tight
  local_num_ctx: 16384   # Context window for local model calls (16K with 64GB RAM)
  retry:
    max_attempts: 3
    initial_backoff_seconds: 1
    backoff_multiplier: 2
    max_backoff_seconds: 10
  circuit_breaker:
    hat_failure_threshold: 5
    hat_reset_timeout_seconds: 60
    provider_failure_threshold: 10
    provider_reset_timeout_seconds: 120

# Risk score formula per CATALOG.md
risk_score:
  critical_weight: 20
  critical_cap: 80
  high_weight: 5
  high_cap: 40
  medium_weight: 1
  medium_cap: 10
  low_weight: 0.1
  low_cap: 5
  allow_threshold: 20
  escalate_threshold: 60