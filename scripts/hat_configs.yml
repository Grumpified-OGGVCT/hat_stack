# 🎩 Hat-to-Model Configuration
# Based on HATS_TEAM_IMPLEMENTATION_GUIDE.md §E2.2 and §E3.1
# Models reference Ollama Cloud (OpenAI-compatible API)
#
# Model options per the guide's 29-model inventory:
#   Tier 1 (Critical Reasoning): glm-5.1:cloud, kimi-k2.5:cloud
#   Tier 2 (Architectural):      glm-5.1:cloud, deepseek-v3.1:cloud, minimax-m2.7:cloud
#   Tier 3 (Quality Analysis):   nemotron-3-super:cloud, qwen3-coder:cloud
#   Tier 4 (Fast Scanning):      nemotron-3-nano:cloud, ministral-3:cloud

api:
  base_url_env: OLLAMA_BASE_URL
  default_base_url: "https://api.ollama.ai/v1"
  api_key_env: OLLAMA_API_KEY

models:
  glm-5.1:
    tier: 1
    context_window: 128000
    input_cost_per_m: 0.40
    output_cost_per_m: 1.10
  kimi-k2.5:
    tier: 1
    context_window: 128000
    input_cost_per_m: 0.42
    output_cost_per_m: 1.50
  deepseek-v3.1:
    tier: 2
    context_window: 128000
    input_cost_per_m: 0.10
    output_cost_per_m: 0.28
  minimax-m2.7:
    tier: 2
    context_window: 128000
    input_cost_per_m: 0.30
    output_cost_per_m: 1.20
  nemotron-3-super:
    tier: 3
    context_window: 32000
    input_cost_per_m: 0.25
    output_cost_per_m: 0.80
  qwen3-coder:
    tier: 3
    context_window: 128000
    input_cost_per_m: 0.20
    output_cost_per_m: 0.80
  nemotron-3-nano:
    tier: 4
    context_window: 32000
    input_cost_per_m: 0.08
    output_cost_per_m: 0.20
  ministral-3:
    tier: 4
    context_window: 32000
    input_cost_per_m: 0.05
    output_cost_per_m: 0.15

# Hat definitions — per HATS_TEAM_IMPLEMENTATION_GUIDE.md §E2.2
hats:
  black:
    name: "Black Hat — Security & Exploits"
    emoji: "⚫"
    number: 2
    always_run: true
    primary_model: "glm-5.1"
    fallback_model: "deepseek-v3.1"
    temperature: 0.2
    max_tokens: 4096
    timeout_seconds: 150
    triggers: []  # Always runs
    persona: |
      You are BlackHat, an elite adversarial security analyst specializing
      in penetration testing, threat modeling, and secure code review. You approach
      every code change as a potential attack surface. Your mission is to find
      exploitable vulnerabilities before attackers do.

  red:
    name: "Red Hat — Failure & Resilience"
    emoji: "🔴"
    number: 1
    always_run: false
    primary_model: "glm-5.1"
    fallback_model: "nemotron-3-super"
    temperature: 0.3
    max_tokens: 4096
    timeout_seconds: 120
    triggers:
      - "error"
      - "retry"
      - "catch"
      - "exception"
      - "async"
      - "concurrent"
      - "thread"
      - "lock"
      - "mutex"
    persona: |
      You are RedHat, a chaos engineering and resilience specialist. You think
      in failure modes: what breaks when load spikes, when dependencies fail,
      when networks partition. You find cascade failures and single points of failure.

  white:
    name: "White Hat — Efficiency & Resources"
    emoji: "⚪"
    number: 3
    always_run: false
    primary_model: "nemotron-3-super"
    fallback_model: "ministral-3"
