# Hat definitions — per soul.md model pool with security rule compliance
# local_only: true means the hat ALWAYS uses a local model (never cloud)
# local_model: model to use when sensitive content is detected (dual-mode hats)
hats:
  red:
    name: "Red Hat — Failure & Resilience"
    emoji: "🔴"
    number: 1
    always_run: false
    primary_model: "deepseek-v3.2:cloud"
    fallback_model: "glm-5.1:cloud"
    local_model: "qwen3.5:9b"
    temperature: 0.3
    max_tokens: 4096
    timeout_seconds: 120
    triggers:
      - "error"
      - "retry"
      - "catch"
      - "exception"
      - "async"
      - "concurrent"
      - "thread"
      - "lock"
      - "mutex"
    persona: |
      You are RedHat, a chaos engineering and resilience specialist. You think
      in failure modes: what breaks when load spikes, when dependencies fail,
      when networks partition. You find cascade failures and single points of failure.

  black:
