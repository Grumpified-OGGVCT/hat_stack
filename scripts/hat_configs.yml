# Hat-to-Model Configuration
# Based on HATS_TEAM_IMPLEMENTATION_GUIDE.md + soul.md model pool merge
# Uses native Ollama API (/api/chat) for both local and cloud models
# Local models → localhost:11434/api/chat (no auth)
# Cloud models → ollama.com/api/chat (Bearer token via OLLAMA_API_KEY)
#
# Model pool per soul.md (April 2026):
#   Tier 1 (Critical Reasoning): glm-5.1:cloud, kimi-k2.5:cloud, deepseek-v3.2:cloud
#   Tier 2 (Architectural):       minimax-m2.7:cloud, devstral-2:123b-cloud
#   Tier 3 (Quality Analysis):    nemotron-3-super:cloud, qwen3-coder:480b-cloud
#   Tier 4 (Fast Scanning):       nemotron-3-nano:cloud, ministral-3:cloud
#   Tier L (Local Only):          gemma4:e2b, gemma4:e4b, qwen3.5:9b,
#                                 phi4-mini:3.8b, gemma3:4b, gemma3:12b,
#                                 deepseek-r1:8b, granite3.3:8b
#
# Security rule (from soul.md):
#   ANY task involving API keys, credentials, secrets, .env files, or auth
#   tokens gets a LOCAL model sub-agent. No exceptions.

api:
  cloud_url_env: OLLAMA_CLOUD_URL
  default_cloud_url: "https://ollama.com"
  local_url_env: OLLAMA_LOCAL_URL
  default_local_url: "http://localhost:11434"
  api_key_env: OLLAMA_API_KEY

