# Hat-to-Model Configuration
# Based on HATS_TEAM_IMPLEMENTATION_GUIDE.md + soul.md model pool merge
#
# Multi-provider LLM routing:
#   Each model can route to Ollama Local, Ollama Cloud, OpenRouter, or other
#   OpenAI-compatible providers. Provider is determined by the `provider` field
#   on each model, or defaults to `ollama_cloud` for cloud models and
#   `ollama_local` for local models.
#
# Local-only mode: Set local_only.enabled: true to force ALL models to local.
# This is the PII-safe mode — no data leaves the machine.
#
# Adding a provider: Add it under `providers:` below, set the API key env var,
# set `enabled: true`, and add models with `provider: <name>`. For
# OpenAI-compatible APIs, set `api_format: openai_compatible` — no code changes.
#
# Model pool per soul.md (April 2026):
#   Tier 1 (Critical Reasoning): glm-5.1:cloud, kimi-k2.5:cloud, deepseek-v3.2:cloud
#   Tier 2 (Architectural):       minimax-m2.7:cloud, devstral-2:123b-cloud
#   Tier 3 (Quality Analysis):    nemotron-3-super:cloud, qwen3-coder:480b-cloud
#   Tier 4 (Fast Scanning):       nemotron-3-nano:cloud, ministral-3:cloud
#   Tier L (Local Only):          gemma4:e2b, gemma4:e4b, qwen3.5:9b,
#                                 phi4-mini:3.8b, gemma3:4b, gemma3:12b,
#                                 deepseek-r1:8b, granite3.3:8b
#
# Security rule (from soul.md):
#   ANY task involving API keys, credentials, secrets, .env files, or auth
#   tokens gets a LOCAL model sub-agent. No exceptions.

# ---------------------------------------------------------------------------
# Provider configuration — which LLM APIs to route to
# ---------------------------------------------------------------------------
providers:
  ollama_local:
    name: "Ollama Local"
    base_url_env: OLLAMA_LOCAL_URL
    default_base_url: "http://localhost:11434"
    api_key_env: ""
    api_format: ollama
    enabled: true

  ollama_cloud:
    name: "Ollama Cloud"
    base_url_env: OLLAMA_CLOUD_URL
    default_base_url: "https://ollama.com"
    api_key_env: OLLAMA_API_KEY
    api_format: ollama
    enabled: true
    default: true  # Default cloud provider for backward compatibility

  openrouter:
    name: "OpenRouter"
    base_url_env: OPENROUTER_BASE_URL
    default_base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY
    api_format: openai_compatible
    enabled: false  # Enable when you set OPENROUTER_API_KEY

  # Future providers — uncomment and configure to enable.
  # For any OpenAI-compatible API, just set api_format: openai_compatible.
  # No code changes required.
  #
  # deepinfra:
  #   name: "DeepInfra"
  #   base_url_env: DEEPINFRA_BASE_URL
  #   default_base_url: "https://api.deepinfra.com/v1/openai"
  #   api_key_env: DEEPINFRA_API_KEY
  #   api_format: openai_compatible
  #   enabled: false
  #
  # groq:
  #   name: "Groq"
  #   base_url_env: GROQ_BASE_URL
  #   default_base_url: "https://api.groq.com/openai/v1"
  #   api_key_env: GROQ_API_KEY
  #   api_format: openai_compatible
  #   enabled: false
  #
  # together:
  #   name: "Together AI"
  #   base_url_env: TOGETHER_BASE_URL
  #   default_base_url: "https://api.together.xyz/v1"
  #   api_key_env: TOGETHER_API_KEY
  #   api_format: openai_compatible
  #   enabled: false

# ---------------------------------------------------------------------------
# Local-only mode — forces ALL hats to use local models
# Set enabled: true for PII-safe operation (no data leaves the machine).
# Hats with local_only: true are unaffected (already local).
# Other hats fall back to their local_model or the best available local model.
# ---------------------------------------------------------------------------
local_only:
  enabled: false

# Legacy API section (kept for reference; providers section above is now authoritative)
api:
  cloud_url_env: OLLAMA_CLOUD_URL
  default_cloud_url: "https://ollama.com"
  local_url_env: OLLAMA_LOCAL_URL
  default_local_url: "http://localhost:11434"
  api_key_env: OLLAMA_API_KEY

# LoLLMs Hub — Multi-tenant agentic runtime (optional provider)
# Acts as both Ollama-compatible and OpenAI-compatible proxy.
# Supports: smart routing, ensemble orchestration, virtual agents,
# multi-node GPU clustering, per-user memory, and rate limiting.
# See: https://github.com/ParisNeo/lollms
lollms:
  enabled: false  # Enable when LoLLMs Hub is running
  url_env: LOLLMS_HUB_URL
  default_url: "http://localhost:8081"
  api_key_env: LOLLMS_HUB_API_KEY
  # LoLLMs provides both Ollama-compatible (/api/chat) and
  # OpenAI-compatible (/v1/chat/completions) endpoints on the same port.
  # Hat Stack will route through the Ollama-compatible endpoint
  # when LoLLMs is enabled, falling back to direct Ollama when not.

# Moltbook — "Sign in with Moltbook" agent authentication (disabled)
# https://moltbook.com/developers
# AI agents authenticate using their Moltbook identity tokens.
# Your app API key (prefixed moltdev_) is stored in MOLTBOOK_APP_KEY.
moltbook:
  enabled: false
  app_key_env: MOLTBOOK_APP_KEY
  verify_url: "https://moltbook.com/api/v1/agents/verify-identity"
  audience: "hat-stack"  # Audience restriction prevents token forwarding
  header_name: "X-Moltbook-Identity"

