# Gate configuration per SPEC.md §7
gates:
  cost_budget:
    max_tokens_per_pr: 150000
    max_usd_per_pr: 0.15  # Ollama Cloud pricing — $0.15 covers ~18 hats
  security_fast_path:
    enabled: true
    trigger_severity: "CRITICAL"
  consistency:
    enabled: true
    conflict_resolution: "cove"  # Gold Hat resolves conflicts
  timeout:
    default_per_hat_seconds: 120

# Execution settings per SPEC.md §8
execution:
  strategy: "tiered_parallel"
  max_concurrent_hats: 6
  max_cloud_parallel: 4  # Max cloud model calls in parallel
  max_local_parallel: 1  # Local models run one at a time
  trio_mode_cloud: 3     # Fallback: 3 cloud + 1 local when budget is tight
  local_num_ctx: 16384   # Context window for local model calls (16K with 64GB RAM)
  fallback_across_providers: true  # Try equivalent models on other providers when primary fails
  retry:
    max_attempts: 3
    initial_backoff_seconds: 1
    backoff_multiplier: 2
    max_backoff_seconds: 10
  circuit_breaker:
    hat_failure_threshold: 5
    hat_reset_timeout_seconds: 60
    provider_failure_threshold: 10
    provider_reset_timeout_seconds: 120

# Risk score formula per CATALOG.md
risk_score:
  critical_weight: 20
  critical_cap: 80
  high_weight: 5
  high_cap: 40
  medium_weight: 1
  medium_cap: 10
  low_weight: 0.1
  low_cap: 5
  allow_threshold: 20
  escalate_threshold: 60

# Gremlin agent society — overnight autonomous review loop
# Gremlins use the hat system: each phase maps to a hat (persona, model chain, fallback)
# Multi-repo: Gremlins scan all repos listed below and produce per-repo findings
# plus a cross-repo Herald digest each morning.
gremlins:
  enabled: true
  gremlins_path: ".gremlins"

  # Repos to monitor — add or remove repos here.
  # Each repo gets its own .gremlins/repos/<name>/ directory for findings.
  # Optional per-repo keys: skip_phases (list), enabled (bool, default true)
  repos:
    - path: "C:/Users/gerry/generic_workspace/GrumpRolled"
    - path: "C:/Users/gerry/generic_workspace/hat_stack"
    - path: "C:/Users/gerry/generic_workspace/HLF_MCP"
    - path: "C:/Users/gerry/generic_workspace/lollms_hub"
    - path: "C:/Users/gerry/generic_workspace/lollms_hub_workflows"
    - path: "C:/Users/gerry/generic_workspace/Memory"
    - path: "C:/Users/gerry/generic_workspace/Omni_Orchestrator"
    - path: "C:/Users/gerry/generic_workspace/scripts"
    - path: "C:/Users/gerry/generic_workspace/services_matrix"
    - path: "C:/Users/gerry/generic_workspace/the_factory"
    - path: "C:/Users/gerry/generic_workspace/_universal_skills"
    - path: "C:/Users/gerry/generic_workspace/ChicComs"
    - path: "C:/Users/gerry/generic_workspace/frankenstein-mcp"

  # Schedule — daemon triggers each phase at its cron time.
  # Old format (list) still works with DeprecationWarning.
  overnight_schedule:
    review:  "0 2 * * *"     # 2 AM — Review queue (Black Hat)
    propose: "0 3 * * *"     # 3 AM — Proposals (Gold Hat)
    analyze: "0 4 * * *"     # 4 AM — Deep analysis (Purple Hat)
    herald:  "0 5 * * *"     # 5 AM — Herald digest (Blue Hat)
  # Map gremlin phases to hats (hat provides persona, model chain, fallback)
  phase_to_hat:
    review: "black"      # Black Hat — security & exploit scanning
    propose: "gold"      # Gold Hat — CoVE synthesis & proposals
    analyze: "purple"     # Purple Hat — deep analysis (dynamic override per proposal)
    herald: "blue"       # Blue Hat — process & digest formatting
  # Overnight mode — larger local models, extended timeouts
  overnight:
    enabled: true
    schedule_start: "01:00"
    schedule_end: "07:00"
    model_overrides:
      review: "qwen3.5:9b"       # Up from gemma4:e2b overnight
      analyze: "qwen3.5:9b"      # Deep analysis gets the biggest model
      propose: "gemma3:12b"       # Synthesis with 12b model
      # herald stays at gemma4:e2b — digests don't need heft
    timeout_multiplier: 5          # 600s instead of 120s
    large_local_models:
      - "qwen3.5:9b"
      - "gemma3:12b"
      - "deepseek-r1:8b"
      - "granite3.3:8b"
    wake_on_lan:
      enabled: false
      target_mac: ""               # MAC address for WoL magic packet
  governance:
    require_human_approval: true
    proposal_ttl_hours: 48     # Proposals expire after 48h if not approved
    max_active_proposals: 10
  herald:
    channels: ["social_log"]    # Future: telegram, discord, etc.
    max_daily_posts: 3